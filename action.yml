name: 'API Dependency Monitor Start Proxy'
description: 'Monitors API traffic and checks for compatibility with OpenAPI specifications.'
inputs:
  path_to_api_spec:
    description: 'Path to the OpenAPI spec file (pass vars.PATH_TO_API_SPEC from your workflow)'
    required: false
    default: ''
  backend_url:
    description: 'Base URL of the API management backend (pass vars.BACKEND_URL from your workflow)'
    required: false
    default: ''
  host_name:
    description: 'Host name to monitor (e.g., httpbin.org) — only required'
    required: false
    default: ''
runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - run: pip install -r ${{ github.action_path }}/requirments.txt
      shell: bash
    - run: python ${{ github.action_path }}/api-dep-moniter.py > /tmp/proxy.log 2>&1 &
      shell: bash
      env:
        ORG_ID: ${{ github.repository_owner_id }}
        ORG_NAME: ${{ github.repository_owner }}
        USER_ID: ${{ github.actor_id }}
        USERNAME: ${{ github.actor }}
        REPO_NAME: ${{ github.repository }}
        PATH_TO_API_SPEC: ${{ inputs.path_to_api_spec }}
        BACKEND_URL: ${{ inputs.backend_url }}
        HOST_NAME: ${{ inputs.host_name }}
    - run: sleep 5
      shell: bash
    - run: |
        sudo cp ~/.mitmproxy/mitmproxy-ca-cert.pem /usr/local/share/ca-certificates/mitmproxy.crt || true
        sudo update-ca-certificates
      shell: bash
    - run: |
        echo "HTTP_PROXY=http://localhost:8080" >> $GITHUB_ENV
        echo "HTTPS_PROXY=http://localhost:8080" >> $GITHUB_ENV
      shell: bash
branding:
  icon: "award"
  color: "blue"