name: Test Action
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Start the proxy via the action
      - uses: ./
        with:
          port: '8080'
          org_id: '1'
          project_name: 'my-project'
          is_provider: 'true'
          path_to_api_spec: './.github/specFiles/sample_api_spec.yaml'

      # Send test requests through the proxy
      - name: Send test HTTP requests through proxy
        run: |
          curl -x http://localhost:8080 http://httpbin.org/get
          curl -x http://localhost:8080 "http://httpbin.org/get?userId=1"
          curl -x http://localhost:8080 -X POST http://httpbin.org/post
          curl -x http://localhost:8080 http://httpbin.org/anything/products
          curl http://httpbin.org/get

      - name: Check proxy process is alive
        if: always()
        run: |
          PID=$(cat moniter_pid.txt)
          echo ""
          echo "=================================================="
          echo "  PROXY PROCESS CHECK  (PID: $PID)"
          echo "=================================================="
          if kill -0 $PID 2>/dev/null; then
            echo ""
            echo "  ✅  YES — PROCESS IS RUNNING"
            echo ""
          else
            echo ""
            echo "  ❌  NO — PROCESS IS NOT RUNNING"
            echo ""
          fi
          echo "=================================================="
          echo ""

      # Stop the proxy and print results
      - name: Stop proxy
        if: always()
        run: |
          PID=$(cat moniter_pid.txt)
          kill -SIGINT $PID || true
          timeout 60 tail --pid=$PID -f /dev/null || true
          if kill -0 $PID 2>/dev/null; then
            echo "SIGINT did not kill the process — sending SIGKILL"
            kill -SIGKILL $PID || true
          else
            echo "Process was killed by SIGINT"
          fi

      - name: Print proxy output
        if: always()
        run: |
          echo ""
          echo "=================================================="
          echo "  PROXY OUTPUT"
          echo "=================================================="
          cat /tmp/proxy.log
          echo "=================================================="
          echo ""

      - name: Test output
        if: always()
        run: exit $(cat exit_code.txt)

      - name: Check proxy process is dead
        if: always()
        run: |
          PID=$(cat moniter_pid.txt)
          echo ""
          echo "=================================================="
          echo "  PROXY PROCESS CHECK  (PID: $PID)"
          echo "=================================================="
          if kill -0 $PID 2>/dev/null; then
            echo ""
            echo "  ✅  YES — PROCESS IS RUNNING"
            echo ""
          else
            echo ""
            echo "  ❌  NO — PROCESS IS NOT RUNNING"
            echo ""
          fi
          echo "=================================================="
          echo ""