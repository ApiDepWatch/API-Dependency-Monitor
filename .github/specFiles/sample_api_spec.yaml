openapi: 3.0.0
info:
  title: Sample API
  version: 1.0.0
paths:
  /get:
    get:
      summary: Get request
      parameters:
        - name: userId
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: OK
  /post:
    post:
      summary: Post request
      responses:
        '200':
          description: OK
  /anything/{path}:
    get:
      summary: Anything endpoint
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
